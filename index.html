<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AODFAH</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #9b59b6; /* ม่วงหลัก */
            --primary-light: #d291bc; /* ชมพูอมม่วง (เส้นขอบ/รายละเอียดรอง) */
            --pink-accent: #ff758c; /* ชมพูสดใส (สำหรับจุดเด่นและปุ่ม) */
            --bg: #f9f0ff; 
            --text: #4a3f4d; /* ตัวอักษรสีม่วงเทาเข้ม */
            --card-bg: #ffffff; 
        }
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Mali', cursive; 
            /* ไล่สี Gradient ม่วงพาสเทล ผสม ชมพูพาสเทล */
            background: linear-gradient(135deg, #f4e8fd 0%, #fde4eb 50%, #f4e8fd 100%);
            background-attachment: fixed; 
            color: var(--text); 
            margin: 0; 
            padding: 10px 15px 80px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #f4e8fd 0%, #fde4eb 50%, #f4e8fd 100%);
            overflow-x: hidden; 
        }
        
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #f4e8fd 0%, #fde4eb 50%, #f4e8fd 100%);
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png'), linear-gradient(135deg, #f4e8fd 0%, #fde4eb 50%, #f4e8fd 100%);
            z-index: 1000; overflow: hidden; margin: 0; padding: 20px; 
        }
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(155, 89, 182, 0.15); text-align: center; width: 100%; max-width: 320px; backdrop-filter: blur(5px); }
        .login-box h2 { color: var(--primary); font-size: 24px; margin-top: 0; margin-bottom: 20px; }
        
        input#passcode { padding: 15px; border: 2px solid var(--primary-light); border-radius: 15px; font-family: 'Mali', cursive; margin-bottom: 20px; width: 100%; outline: none; font-size: 20px; text-align: center; letter-spacing: 5px; background: #faf5fd; color: var(--primary); font-weight: 700; transition: 0.3s; touch-action: manipulation; }
        input#passcode:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(155, 89, 182, 0.2); }
        
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; touch-action: manipulation; }
        .pin-btn { background: white; border: 2px solid #e1c6ea; color: var(--text); font-size: 20px; border-radius: 50%; width: 65px; height: 65px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-family: 'Mali', cursive; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); user-select: none; }
        .pin-btn:active, .pin-btn:hover { background: var(--primary-light); color: white; border-color: var(--primary); transform: scale(0.95); }
        .pin-btn.action-btn { font-size: 16px; border-color: #eee; }
        .pin-btn.submit-btn { background: var(--primary); color: white; border-color: var(--primary); font-size: 18px; }

        /* ปุ่มหลักไล่สีม่วงไปชมพู */
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--pink-accent)); color: white; border: none; padding: 12px 25px; border-radius: 20px; font-family: 'Mali', cursive; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3); transition: 0.3s; width: 100%; touch-action: manipulation; }
        .btn-main:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(155, 89, 182, 0.4); }
        
        #main-content { display: none; width: 100%; max-width: 900px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .top-navbar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; }
        .hamburger-btn { font-size: 28px; color: var(--primary); cursor: pointer; padding: 5px 10px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e1c6ea; }
        
        .sidebar { height: 100vh; width: 250px; position: fixed; z-index: 3000; top: 0; left: -260px; background-color: white; box-shadow: 5px 0 15px rgba(155,89,182,0.15); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding-top: 30px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); z-index: 2999; display: none; backdrop-filter: blur(2px); animation: fadeIn 0.3s; }
        .sidebar-overlay.open { display: block; }
        .sidebar-logo { text-align: center; color: var(--primary); font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        .sidebar .menu-btn { background: transparent; color: var(--text); border: none; font-size: 16px; text-align: left; padding: 15px 30px; border-radius: 0; font-family: 'Mali', cursive; font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; width: 100%; }
        .sidebar .menu-btn.active { background: #f5e6fa; color: var(--primary); border-left: 4px solid var(--primary); }
        .sidebar .menu-btn:hover:not(.active) { background: #fafafa; }

        .header-profiles { display: flex; justify-content: center; align-items: center; gap: 10px; background: white; padding: 8px 15px; border-radius: 30px; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.1); }
        .user-status { display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .profile-img-container { position: relative; }
        .profile-img-container img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #fff; padding: 2px; }
        
        .profile-boy { border: 3px solid #8e44ad !important; box-shadow: 0 0 10px rgba(142, 68, 173, 0.3); }
        .profile-girl { border: 3px solid #e84393 !important; box-shadow: 0 0 10px rgba(232, 67, 147, 0.3); }
        
        .user-status span { font-weight: 700; font-size: 12px; color: var(--text); max-width: 65px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .heart-divider { color: var(--pink-accent); font-size: 18px; animation: heartbeat 1.5s infinite; }

        .status-badge { background: #f5e6fa; color: var(--primary); font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 12px; margin-top: 3px; border: 1px solid #e1c6ea; max-width: 85px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; display: inline-block; }
        .status-badge.editable { cursor: pointer; box-shadow: 0 2px 5px rgba(155, 89, 182, 0.2); border-color: var(--primary-light); }
        .status-badge.editable:hover { background: var(--primary-light); color: white; transform: scale(1.05); }

        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.4s; }
        .add-form-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(155,89,182,0.08); margin-bottom: 30px; border: 2px dashed #e1c6ea; text-align: center; }
        .add-form-card input { width: 100%; padding: 12px; border: 2px solid var(--primary-light); border-radius: 15px; font-family: 'Mali', cursive; margin-bottom: 15px; font-size: 14px; outline: none; }
        
        .fab-container { position: fixed; bottom: 30px; right: 25px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        .fab-menu { display: none; flex-direction: column; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        .fab-menu.show { display: flex; animation: fadeIn 0.2s; }
        .fab-menu-btn { background: white; border: 2px solid var(--primary-light); color: var(--primary); padding: 10px 15px; border-radius: 20px; font-family: 'Mali', cursive; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(155,89,182,0.15); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .fab-menu-btn:hover { background: #f5e6fa; transform: scale(1.05); }
        .fab-btn { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--pink-accent)); color: white; border-radius: 50%; font-size: 32px; font-weight: bold; border: none; box-shadow: 0 10px 25px rgba(155, 89, 182, 0.4); cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
        .fab-btn:hover { transform: scale(1.1); box-shadow: 0 12px 30px rgba(155, 89, 182, 0.6); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(3px); animation: fadeIn 0.2s; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; }

        .polaroid-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; padding: 0 5px; }
        .polaroid { background: #fff; padding: 10px 10px 45px 10px; box-shadow: 0 4px 10px rgba(155,89,182,0.1), 0 1px 3px rgba(155,89,182,0.08); text-align: center; position: relative; display: flex; flex-direction: column; border-radius: 2px; }
        .polaroid img.main-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 0; border: 1px solid #eaeaea; background: #fafafa; }
        .polaroid p { margin: 12px 0 0 0; font-weight: 600; font-size: 12px; color: var(--text); line-height: 1.4; word-wrap: break-word; }
        
        .uploader-badge { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.95); padding: 3px 6px 3px 3px; border-radius: 20px; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 8px rgba(155,89,182,0.15); font-size: 9px; font-weight: 700; color: var(--primary); z-index: 5; }
        .uploader-badge img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }

        .opt-menu { position: absolute; top: 15px; right: 15px; z-index: 10; }
        .opt-dot-btn { background: rgba(255,255,255,0.9); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 16px; line-height: 0; box-shadow: 0 2px 5px rgba(155,89,182,0.15); user-select: none; color: #555; }
        .opt-dropdown { display: none; position: absolute; top: 25px; right: 0; background: white; border: 1px solid #e1c6ea; box-shadow: 0 4px 12px rgba(155,89,182,0.15); border-radius: 10px; padding: 5px 0; min-width: 100px; text-align: left; }
        .opt-dropdown.show { display: block; }
        .opt-item { padding: 8px 12px; font-size: 12px; color: var(--text); cursor: pointer; font-weight: 600; }
        .opt-item:hover { background: #f5e6fa; color: var(--primary); }

        .reaction-bar { display: flex; justify-content: flex-start; margin-top: auto; padding-top: 10px; border-top: 1px dashed #e1c6ea; align-items: center; position: relative; gap: 8px; }
        
        .like-btn { font-size: 11px; font-weight: 700; color: #888; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; padding: 6px 10px; border-radius: 12px; transition: 0.2s; border: 1px solid #eee; background: #fafafa; }
        .like-btn:hover { background: #f5e6fa; color: var(--primary); border-color: var(--primary-light); }
        .like-btn.liked { color: var(--pink-accent); background: #f5e6fa; border-color: var(--primary-light); }

        .like-pic-frame { position: relative; display: inline-block; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(155,89,182,0.15); border: 2px solid #fff; }
        .like-pic-frame img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; display: block; }

        .music-card { background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(155,89,182,0.1); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 5px solid var(--primary); position: relative; width: 100%; }
        .music-thumb { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; margin-right: 12px; box-shadow: 0 2px 6px rgba(155,89,182,0.15); flex-shrink: 0; border: 1px solid #eee; }
        .music-info { display: flex; flex-direction: column; gap: 4px; text-align: left; flex: 1; overflow: hidden; padding-right: 10px; }
